# configs/train/pretrain-50m.yaml — Albor 50M pipeline validation model
#
# Purpose: Validate the entire training stack end-to-end in hours, not days.
# This model proves entrenar, trueno, alimentar, and apr work together
# before committing GPU days to the 350M run.

model:
  path: "checkpoints/albor-base-50m"       # Output path (initialized from scratch)
  mode: transformer                         # LLM transformer mode
  architecture:
    hidden_size: 512                        # d_model
    num_hidden_layers: 12
    num_attention_heads: 8                  # d_head = 64
    num_key_value_heads: 2                  # GQA 4:1 ratio
    intermediate_size: 2048                 # SwiGLU FFN (gate + up + down)
    vocab_size: 32768                       # BPE, power of 2 for GPU efficiency
    max_position_embeddings: 2048           # Context length
    rms_norm_eps: 1.0e-5

data:
  train: "data/tokenized/train/"
  val: "data/tokenized/val/"
  batch_size: 16                           # Larger micro-batch — model fits easily
  seq_len: 2048
  tokenizer: "models/albor-tokenizer/tokenizer.json"
  input_column: "text"

optimizer:
  name: "adamw"
  lr: 6.0e-4                               # Higher LR for smaller model
  beta1: 0.9
  beta2: 0.95
  weight_decay: 0.1

training:
  mode: "causal_lm"
  epochs: 1
  grad_clip: 1.0
  lr_scheduler: "cosine"
  warmup_steps: 500
  gradient_accumulation: 8                 # Global batch = 16 * 8 * 2048 = 256K tokens
  mixed_precision: "fp16"
  output_dir: "./checkpoints/albor-base-50m"
  save_interval: 500
  max_steps: 5_000                         # Quick validation run (~1.3B tokens)

monitoring:
  terminal:
    enabled: true
    refresh_rate: 1000
    metrics: ["loss", "learning_rate", "gradient_norm"]
    charts:
      - type: "loss_curve"
        metric: "loss"
        window: 50
        show_eta: true

  tracking:
    enabled: true
    backend: "sqlite"
    experiment: "albor-pretrain-50m"
    tags:
      model: "albor-50m"
      stage: "pretrain"
      data: "pipeline-validation"

  system:
    enabled: true
    interval: 5000
    metrics: ["gpu_utilization", "memory", "temperature"]

  alerts:
    - condition: "loss > 10"
      action: "stop"
      message: "Loss exploded — Andon stop"
    - condition: "gradient_norm > 100"
      action: "stop"
      message: "Gradient explosion — Andon stop"
