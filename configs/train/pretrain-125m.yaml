# configs/train/pretrain-125m.yaml — Albor 125M intermediate model
#
# Purpose: Intermediate checkpoint between 50M validation and 350M final.
# First model large enough for meaningful benchmark numbers.
# Training time: ~1-2 days on RTX 4090.

model:
  preset: "llama"
  hidden_size: 768                         # d_model
  num_layers: 16
  num_attention_heads: 12                  # d_head = 64
  num_kv_heads: 4                          # GQA 3:1 ratio
  intermediate_size: 3072                  # SwiGLU FFN
  vocab_size: 32_768
  max_position_embeddings: 2048
  rms_norm_eps: 1.0e-5
  tie_word_embeddings: false
  dropout: 0.0

data:
  train: "data/tokenized/train/"
  val: "data/tokenized/val/"
  batch_size: 12
  seq_len: 2048
  tokenizer: "models/albor-tokenizer/tokenizer.json"
  input_column: "text"

optimizer:
  name: "adamw"
  lr: 4.0e-4
  beta1: 0.9
  beta2: 0.95
  weight_decay: 0.1

training:
  mode: "causal_lm"
  epochs: 1
  grad_clip: 1.0
  lr_scheduler: "cosine"
  warmup_steps: 1000
  gradient_accumulation: 16                # Global batch = 12 * 16 * 2048 = 384K tokens
  mixed_precision: "fp16"
  output_dir: "./checkpoints/albor-base-125m"
  save_interval: 1000

monitoring:
  terminal:
    enabled: true
    refresh_rate: 1000
    metrics: ["loss", "learning_rate", "gradient_norm"]
    charts:
      - type: "loss_curve"
        metric: "loss"
        window: 100
        show_eta: true

  tracking:
    enabled: true
    backend: "sqlite"
    experiment: "albor-pretrain-125m"
    tags:
      model: "albor-125m"
      stage: "pretrain"
      data: "10B-python-80pct"

  system:
    enabled: true
    interval: 5000
    metrics: ["gpu_utilization", "memory", "temperature"]

  alerts:
    - condition: "loss > 10"
      action: "stop"
      message: "Loss exploded — Andon stop"
    - condition: "gradient_norm > 100"
      action: "stop"
      message: "Gradient explosion — Andon stop"
