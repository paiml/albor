# configs/train/distill-student-v4.yaml — Distillation with textbook synthetic data
#
# Fine-tune v15 base model on synthetic textbook-quality completions from
# Qwen3-Coder-30B teacher. Follows phi-1 playbook: textbook data >> raw code.
#
# Data: 118 textbook prompts × 5 completions = ~590 synthetic examples
#       + codeparrot-clean subset for mixing
#       Target: 80% synthetic + 20% codeparrot (phi-1 ratio)
#
# Base model: v15 model-best.apr (best checkpoint at training end)
# Lower LR than pretraining (1e-4 vs 3e-4) — fine-tuning, not from scratch
#
# Token budget: ~5K steps × 32K tokens = 163M tokens (~3 epochs over mixed data)

model:
  path: "./checkpoints/albor-base-350m-v15/model-best.apr"
  mode: transformer
  architecture:
    hidden_size: 1024
    num_hidden_layers: 24
    num_attention_heads: 16
    num_key_value_heads: 4
    intermediate_size: 4096
    vocab_size: 32768
    max_position_embeddings: 1024
    rms_norm_eps: 1.0e-5
    rope_theta: 10000.0

data:
  train: "data/distill/mixed-v4/train/"
  val: "data/pretokenized-1024-v3/val/"
  batch_size: 4
  seq_len: 1024
  tokenizer: "models/albor-tokenizer-v2/tokenizer.json"
  input_column: "input_ids"

optimizer:
  name: "adamw"
  lr: 1.0e-4
  beta1: 0.9
  beta2: 0.95
  weight_decay: 0.1

training:
  mode: "causal_lm"
  epochs: 3
  grad_clip: 1.0
  lr_scheduler: "cosine"
  warmup_steps: 100
  gradient_accumulation: 8
  output_dir: "./checkpoints/albor-distill-v4"
  save_interval: 500
  eval_interval: 100
  patience: 15
  max_steps: 5000
  seed: 42

monitoring:
  terminal:
    enabled: false
  tracking:
    enabled: false
  system:
    enabled: false

  alerts:
    - condition: "loss > 10"
      action: "stop"
      message: "Loss exploded — Andon stop"
    - condition: "gradient_norm > 100"
      action: "stop"
      message: "Gradient explosion — Andon stop"
