# configs/train/pretrain-350m-v15.yaml — v15: Fresh seed after v14 plateau
#
# v14 plateaued at val_ppl ~782 for 19K steps (no phase change).
# v13 phase-changed at step 4K with the same config. Root cause:
# random init variance — seed=42 (default) produced a degenerate
# initialization for the v14 binary. Trying seed=123.
#
# Architecture: 350M LLaMA-style (same as v9/v13/v14)
# Data: codeparrot-clean 5.3B tokens (19 train shards)
# Starting weights: random init (seed=123)
# ALB-120 fix active (data position checkpoint)

model:
  path: "."
  mode: transformer
  architecture:
    hidden_size: 1024
    num_hidden_layers: 24
    num_attention_heads: 16
    num_key_value_heads: 4
    intermediate_size: 4096
    vocab_size: 32768
    max_position_embeddings: 1024
    rms_norm_eps: 1.0e-5
    rope_theta: 10000.0

data:
  train: "data/pretokenized-1024-v3/train/"
  val: "data/pretokenized-1024-v3/val/"
  batch_size: 4
  seq_len: 1024
  tokenizer: "models/albor-tokenizer-v2/tokenizer.json"
  input_column: "input_ids"

optimizer:
  name: "adamw"
  lr: 3.0e-4
  beta1: 0.9
  beta2: 0.95
  weight_decay: 0.1

training:
  mode: "causal_lm"
  epochs: 1
  grad_clip: 1.0
  lr_scheduler: "cosine"
  warmup_steps: 2000
  gradient_accumulation: 8
  output_dir: "./checkpoints/albor-base-350m-v15"
  save_interval: 5000
  eval_interval: 1000
  patience: 30
  max_steps: 155000
  seed: 123

monitoring:
  terminal:
    enabled: false
  tracking:
    enabled: false
  system:
    enabled: false

  alerts:
    - condition: "loss > 10"
      action: "stop"
      message: "Loss exploded — Andon stop"
    - condition: "gradient_norm > 100"
      action: "stop"
      message: "Gradient explosion — Andon stop"
