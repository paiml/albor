# configs/train/pretrain-350m-v10.yaml — v10: Continue v9 with 3x more tokens
#
# v9 stopped at step 14,950 (490M tokens) with val_ppl=129-133.
# Early stopping triggered on noise — model was still improving.
# v10 continues from v9-best with fresh optimizer, lower LR, more patience.
#
# Architecture: 350M LLaMA-style (same as v9)
# Data: codeparrot-clean 5.3B tokens (19 train shards)
# Starting weights: v9 best checkpoint (val_ppl=129)
#
# Token budget: 50,000 steps × 32,768 tokens/step = 1.64B tokens
# Total tokens seen (v9 + v10): 490M + 1.64B = 2.13B tokens
# Expected: ~8K tok/s, ~14 hours
#
# LR: 1e-4 peak (lower than v9's 3e-4 since model is partially trained)
# Patience: 20 (v9 used 10, was too aggressive)

model:
  path: "./checkpoints/albor-base-350m-v9/model-best.apr"
  mode: transformer
  architecture:
    hidden_size: 1024
    num_hidden_layers: 24
    num_attention_heads: 16
    num_key_value_heads: 4
    intermediate_size: 4096
    vocab_size: 32768
    max_position_embeddings: 1024
    rms_norm_eps: 1.0e-5
    rope_theta: 10000.0

data:
  train: "data/pretokenized-1024-v3/train/"
  val: "data/pretokenized-1024-v3/val/"
  batch_size: 4
  seq_len: 1024
  tokenizer: "models/albor-tokenizer-v2/tokenizer.json"
  input_column: "input_ids"

optimizer:
  name: "adamw"
  lr: 1.0e-4
  beta1: 0.9
  beta2: 0.95
  weight_decay: 0.1

training:
  mode: "causal_lm"
  epochs: 1
  grad_clip: 1.0
  lr_scheduler: "cosine"
  warmup_steps: 500
  gradient_accumulation: 8
  output_dir: "./checkpoints/albor-base-350m-v10"
  save_interval: 1000
  eval_interval: 500
  patience: 20
  max_steps: 50000

monitoring:
  terminal:
    enabled: false
  tracking:
    enabled: false
  system:
    enabled: false

  alerts:
    - condition: "loss > 10"
      action: "stop"
      message: "Loss exploded — Andon stop"
    - condition: "gradient_norm > 100"
      action: "stop"
      message: "Gradient explosion — Andon stop"
