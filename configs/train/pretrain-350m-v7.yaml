# configs/train/pretrain-350m-v7.yaml — v7: Clean start, all fixes, correct val
#
# Includes all fixes from v3-v6:
#   - ALB-079: Cosine LR schedule active
#   - ALB-080: ga=8 → 32K tokens/step
#   - ALB-091: GPU-resident gradient accumulation (CudaGradWorkspace)
#   - ALB-092: RMSNorm grad_gamma, accum zeroing, step restore
#   - Val from same distribution as train (shard-0019 subsample)
#
# Architecture: 350M LLaMA-style (h=1024, L=24, heads=16, kv_heads=4, ffn=4096)
# Data: codeparrot-clean 5.3B tokens (19 train shards, 1K val sequences)
#
# Token budget: 20,000 steps × 32,768 tokens/step = 655M tokens
# Expected: ~7.9K tok/s, ~23% MFU, ~24 hours

model:
  path: "."
  mode: transformer
  architecture:
    hidden_size: 1024
    num_hidden_layers: 24
    num_attention_heads: 16
    num_key_value_heads: 4
    intermediate_size: 4096
    vocab_size: 32768
    max_position_embeddings: 1024
    rms_norm_eps: 1.0e-5

data:
  train: "data/pretokenized-1024-v3/train/"
  val: "data/pretokenized-1024-v3/val/"
  batch_size: 4
  seq_len: 1024
  tokenizer: "models/albor-tokenizer-v2/tokenizer.json"
  input_column: "input_ids"

optimizer:
  name: "adamw"
  lr: 3.0e-4
  beta1: 0.9
  beta2: 0.95
  weight_decay: 0.1

training:
  mode: "causal_lm"
  epochs: 1
  grad_clip: 1.0
  lr_scheduler: "cosine"
  warmup_steps: 500
  gradient_accumulation: 8
  output_dir: "./checkpoints/albor-base-350m-v7"
  save_interval: 500
  eval_interval: 250
  patience: 10
  max_steps: 20000

monitoring:
  terminal:
    enabled: false

  tracking:
    enabled: false
    backend: "sqlite"
    experiment: "albor-pretrain-350m-v7"
    tags:
      model: "albor-350m"
      stage: "pretrain"
      data: "codeparrot-clean-5.3B"
      batch: "32K-tokens"

  system:
    enabled: false

  alerts:
    - condition: "loss > 10"
      action: "stop"
      message: "Loss exploded — Andon stop"
    - condition: "gradient_norm > 100"
      action: "stop"
      message: "Gradient explosion — Andon stop"
