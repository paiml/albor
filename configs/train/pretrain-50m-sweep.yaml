# 50M proxy model for HPO via μTransfer (C-HPO-001)
# Width=512 → 350M width=1024 → lr_350m = lr_50m × 0.5
# Run: apr train sweep --config configs/train/pretrain-50m-sweep.yaml
# Each config runs ~2 min for 500 steps on GPU
model:
  path: "."
  mode: transformer
  architecture:
    hidden_size: 512
    num_hidden_layers: 12
    num_attention_heads: 8
    num_key_value_heads: 2
    intermediate_size: 2048
    vocab_size: 32768
    max_position_embeddings: 1024
    rms_norm_eps: 1.0e-5
    rope_theta: 10000.0
data:
  train: "data/pretokenized-1024-v3/train/"
  val: "data/pretokenized-1024-v3/val/"
  batch_size: 4
  seq_len: 1024
  tokenizer: "models/albor-tokenizer-v2/tokenizer.json"
  input_column: "input_ids"
optimizer:
  name: "adamw"
  lr: 6.0e-4
  beta1: 0.9
  beta2: 0.95
  weight_decay: 0.1
training:
  mode: "causal_lm"
  epochs: 1
  grad_clip: 1.0
  lr_scheduler: "cosine"
  warmup_steps: 100
  gradient_accumulation: 8
  output_dir: "./checkpoints/albor-50m-sweep"
  save_interval: 10000
  eval_interval: 250
  patience: 100
  max_steps: 2000
  seed: 42
monitoring:
  terminal: { enabled: false }
  tracking: { enabled: false }
  system: { enabled: false }
  alerts:
    - condition: "loss > 15"
      action: "stop"
      message: "Loss exploded"
