# configs/train/pretrain-350m-v3.yaml — Albor 350M with codeparrot-clean dataset
#
# Same model architecture as v2 but trained on ~5B tokens from codeparrot-clean
# (2M Python files, quality filtered). Target: HumanEval pass@1 > 8%.
#
# C-TRAINCFG-001 pre-flight verification (computed after pretokenization):
#   num_sequences:    ~5,200,000 (20 shards × ~260K seqs/shard)
#   steps_per_epoch:  floor(5200000 / 4 / 1) = 1,300,000
#   epochs:           1 (steps_per_epoch >> max_steps)
#   warmup_steps:     2000 (0.8% of max_steps, well under 10%)
#   total_tokens:     250000 × 4 × 1024 = 1,024,000,000 (~1B tokens)
#
# Time estimate (pre-ALB-076): 250K steps × ~3.5s/step ≈ 10.1 days
# Time estimate (post-ALB-076): 250K steps × ~0.44s/step ≈ 1.3 days
# (measured 9,216 tok/s on RTX 4090, 9.9x improvement over v2 baseline)

model:
  path: "."                                  # From scratch (random init)
  mode: transformer
  architecture:
    hidden_size: 1024
    num_hidden_layers: 24
    num_attention_heads: 16
    num_key_value_heads: 4
    intermediate_size: 4096
    vocab_size: 32768
    max_position_embeddings: 1024
    rms_norm_eps: 1.0e-5

data:
  train: "data/pretokenized-1024-v3/train/"
  val: "data/pretokenized-2048/val/"           # Reuse v1 validation set
  batch_size: 4
  seq_len: 1024
  tokenizer: "models/albor-tokenizer-v2/tokenizer.json"
  input_column: "input_ids"

optimizer:
  name: "adamw"
  lr: 3.0e-4
  beta1: 0.9
  beta2: 0.95
  weight_decay: 0.1

training:
  mode: "causal_lm"
  epochs: 1                                  # C-TRAINCFG-001: steps_per_epoch=1.3M >> max_steps=250K
  grad_clip: 1.0                              # Re-enabled post-ALB-076 (GPU-side grad clip)
  lr_scheduler: "cosine"
  warmup_steps: 2000                         # C-TRAINCFG-001: warmup_fraction = 2000/250000 = 0.8%
  gradient_accumulation: 1                   # ALB-066: per-sequence optimizer (no true accum in CUDA trainer)
  # mixed_precision: "fp16"                  # DISABLED: NaN after step 1 (investigating)
  output_dir: "./checkpoints/albor-base-350m-v3"
  save_interval: 1000                        # Every 1K steps (~1.2h), old checkpoints pruned
  max_steps: 250000

monitoring:
  terminal:
    enabled: false                              # nohup compatibility
    refresh_rate: 1000
    metrics: ["loss", "learning_rate", "gradient_norm"]
    charts:
      - type: "loss_curve"
        metric: "loss"
        window: 100
        show_eta: true

  tracking:
    enabled: false                              # nohup compatibility
    backend: "sqlite"
    experiment: "albor-pretrain-350m-v3"
    tags:
      model: "albor-350m"
      stage: "pretrain"
      data: "codeparrot-clean-2M"

  system:
    enabled: false                              # nohup compatibility
    interval: 5000
    metrics: ["gpu_utilization", "memory", "temperature"]

  alerts:
    - condition: "loss > 10"
      action: "stop"
      message: "Loss exploded — Andon stop"
    - condition: "gradient_norm > 100"
      action: "stop"
      message: "Gradient explosion — Andon stop"
