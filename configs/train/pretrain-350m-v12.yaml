# configs/train/pretrain-350m-v12.yaml — v12: True resume from v9 with optimizer state
#
# v10 FAILED: fresh optimizer + low LR (1e-4) → val_ppl plateaued at 660.
# v11 FAILED: fresh optimizer + same LR (3e-4) → val_ppl plateaued at 750.
# Root cause: cold-start from model.path skips optimizer state loading.
# Adam second moments encode per-parameter curvature — critical for continuation.
#
# v12 fix: checkpoint placed in output_dir triggers FULL resume path:
#   - Model weights restored
#   - Embedding optimizer m/v moments restored
#   - Step counter restored (resumes at v9's step ~14,950)
#   - GPU AdamW bias correction restored
#
# Architecture: 350M LLaMA-style (same as v9)
# Data: codeparrot-clean 5.3B tokens (19 train shards)
# Starting weights: v9 best checkpoint WITH optimizer state
#
# Token budget: ~140K remaining steps × 32,768 tokens/step = 4.59B tokens
# Total tokens seen (v9 + v12): 490M + 4.59B = 5.08B tokens (~73% Chinchilla)
# LR at resume: ~2.93e-4 (9.6% through cosine schedule, near peak)
# Expected: ~5K tok/s, ~11 days

model:
  path: "."
  mode: transformer
  architecture:
    hidden_size: 1024
    num_hidden_layers: 24
    num_attention_heads: 16
    num_key_value_heads: 4
    intermediate_size: 4096
    vocab_size: 32768
    max_position_embeddings: 1024
    rms_norm_eps: 1.0e-5
    rope_theta: 10000.0

data:
  train: "data/pretokenized-1024-v3/train/"
  val: "data/pretokenized-1024-v3/val/"
  batch_size: 4
  seq_len: 1024
  tokenizer: "models/albor-tokenizer-v2/tokenizer.json"
  input_column: "input_ids"

optimizer:
  name: "adamw"
  lr: 3.0e-4
  beta1: 0.9
  beta2: 0.95
  weight_decay: 0.1

training:
  mode: "causal_lm"
  epochs: 1
  grad_clip: 1.0
  lr_scheduler: "cosine"
  warmup_steps: 500
  gradient_accumulation: 8
  output_dir: "./checkpoints/albor-base-350m-v12"
  save_interval: 5000
  eval_interval: 1000
  patience: 30
  max_steps: 155000

monitoring:
  terminal:
    enabled: false
  tracking:
    enabled: false
  system:
    enabled: false

  alerts:
    - condition: "loss > 10"
      action: "stop"
      message: "Loss exploded — Andon stop"
    - condition: "gradient_norm > 100"
      action: "stop"
      message: "Gradient explosion — Andon stop"
