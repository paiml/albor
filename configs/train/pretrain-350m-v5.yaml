# configs/train/pretrain-350m-v5.yaml — v5: Fresh start with full data coverage
#
# Data: pretokenized-1024-v3 (5.3B unique tokens from codeparrot-clean)
# Key insight: v4 only trained on 18.6% of available data (983M / 5.3B).
# v5 trains for a full epoch to see all unique data.
#
# Architecture: Same 350M LLaMA-style model as v3/v4.
#
# ALB-091 FIXED: GPU-resident gradient accumulation eliminates D2H bottleneck.
# batch=4, ga=8 → 32K tokens/step at 7.7K tok/s (22% MFU) — zero throughput loss.
# Previous CPU-side ga: 2.9K tok/s (2.6x regression), now eliminated.
#
# Token budget: 20,000 steps × 32,768 tokens/step = 655M tokens
# ETA: ~24 hours at 7.7K tok/s
#
# Scaling law prediction (ALB-082) will run automatically at eval checkpoints.

model:
  path: "./checkpoints/albor-base-350m-v5/"
  mode: transformer
  architecture:
    hidden_size: 1024
    num_hidden_layers: 24
    num_attention_heads: 16
    num_key_value_heads: 4
    intermediate_size: 4096
    vocab_size: 32768
    max_position_embeddings: 1024
    rms_norm_eps: 1.0e-5

data:
  train: "data/pretokenized-1024-v3/train/"
  val: "data/pretokenized-2048/val/"
  batch_size: 4
  seq_len: 1024
  tokenizer: "models/albor-tokenizer-v2/tokenizer.json"
  input_column: "input_ids"

optimizer:
  name: "adamw"
  lr: 3.0e-4
  beta1: 0.9
  beta2: 0.95
  weight_decay: 0.1

training:
  mode: "causal_lm"
  epochs: 1
  grad_clip: 1.0
  lr_scheduler: "cosine"
  warmup_steps: 500
  gradient_accumulation: 8                     # 32K tokens/step (GPU-resident accum, ALB-091 fixed)
  output_dir: "./checkpoints/albor-base-350m-v5"
  save_interval: 500
  max_steps: 20000                            # 20K × 32K = 655M tokens ≈ full epoch

monitoring:
  terminal:
    enabled: false

  tracking:
    enabled: false
    backend: "sqlite"
    experiment: "albor-pretrain-350m-v5"
    tags:
      model: "albor-350m"
      stage: "pretrain"
      data: "codeparrot-clean-5.3B"
      batch: "32K-tokens"

  system:
    enabled: false

  alerts:
    - condition: "loss > 10"
      action: "stop"
      message: "Loss exploded — Andon stop"
    - condition: "gradient_norm > 100"
      action: "stop"
      message: "Gradient explosion — Andon stop"
