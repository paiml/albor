# configs/train/pretrain-350m-cpu-test.yaml — CPU training test for gx10 (aarch64)
#
# Minimal config to validate CPU training pipeline on NVIDIA GB10.
# Uses small batch/steps to verify forward/backward/optimizer work.
# NOT intended for production training (CPU is ~100x slower than GPU).

model:
  path: "./checkpoints/albor-base-350m-v9"
  mode: transformer
  architecture:
    hidden_size: 1024
    num_hidden_layers: 24
    num_attention_heads: 16
    num_key_value_heads: 4
    intermediate_size: 4096
    vocab_size: 32768
    max_position_embeddings: 1024
    rms_norm_eps: 1.0e-5

data:
  train: "data/pretokenized-1024-v3/train/"
  val: "data/pretokenized-1024-v3/val/"
  batch_size: 1
  seq_len: 256
  tokenizer: "models/albor-tokenizer-v2/tokenizer.json"
  input_column: "input_ids"

optimizer:
  name: "adamw"
  lr: 1.0e-4
  beta1: 0.9
  beta2: 0.95
  weight_decay: 0.1

training:
  mode: "causal_lm"
  epochs: 1
  grad_clip: 1.0
  lr_scheduler: "cosine"
  warmup_steps: 5
  gradient_accumulation: 1
  output_dir: "./checkpoints/albor-cpu-test"
  save_interval: 100
  eval_interval: 10
  max_steps: 5

monitoring:
  terminal:
    enabled: false
  tracking:
    enabled: false
  system:
    enabled: false
