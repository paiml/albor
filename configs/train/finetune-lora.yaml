# configs/train/finetune-lora.yaml — LoRA instruction fine-tuning
#
# Fine-tunes albor-distill-350m with LoRA adapters on instruction-following data.
# Produces albor-instruct-350m with improved structured output and chat capability.
#
# LoRA keeps base weights frozen, trains low-rank adapters (~2-5% of total params).
# VRAM overhead: minimal — only adapter gradients + optimizer states.

base_model:
  checkpoint: "./checkpoints/albor-distill/checkpoint-best.apr"
  config: "configs/train/pretrain-350m.yaml"
  freeze: true                             # Base weights frozen

lora:
  rank: 16                                 # Low-rank dimension
  alpha: 32                                # Scaling factor (alpha/rank = 2.0)
  dropout: 0.05                            # LoRA dropout for regularization
  target_modules:                          # Which layers get adapters
    - "q_proj"
    - "v_proj"
    - "o_proj"
    - "gate_proj"
    - "up_proj"
    - "down_proj"

data:
  train: "data/instruction/train/"
  val: "data/instruction/val/"
  format: "jsonl"                          # {"instruction": ..., "input": ..., "output": ...}
  batch_size: 4
  seq_len: 2048
  tokenizer: "models/albor-tokenizer/tokenizer.json"

optimizer:
  name: "adamw"
  lr: 2.0e-4                               # Standard LoRA LR
  beta1: 0.9
  beta2: 0.95
  weight_decay: 0.01                       # Light weight decay for fine-tuning

training:
  mode: "instruction_tuning"
  epochs: 3                                # Multiple epochs on small instruction dataset
  grad_clip: 1.0
  lr_scheduler: "cosine"
  warmup_steps: 100
  gradient_accumulation: 8                 # Global batch = 4 * 8 * 2048 = 64K tokens
  mixed_precision: "fp16"
  output_dir: "./checkpoints/albor-instruct"
  save_interval: 200
  eval_interval: 100                       # Evaluate more frequently

monitoring:
  terminal:
    enabled: true
    refresh_rate: 1000
    metrics: ["loss", "learning_rate", "gradient_norm", "eval_loss"]
    charts:
      - type: "loss_curve"
        metric: "loss"
        window: 20
        show_eta: true

  tracking:
    enabled: true
    backend: "sqlite"
    experiment: "albor-finetune-lora"
    tags:
      model: "albor-350m"
      stage: "finetune-lora"
      lora_rank: "16"
      lora_alpha: "32"

  system:
    enabled: true
    interval: 5000
    metrics: ["gpu_utilization", "memory", "temperature"]

  alerts:
    - condition: "loss > 5"
      action: "warn"
      message: "Loss unusually high for fine-tuning"
    - condition: "eval_loss > train_loss * 1.5"
      action: "warn"
      message: "Possible overfitting — eval loss diverging"
