# configs/train/pretrain-350m.yaml — Albor 350M pre-training config
#
# THE primary training config. Defines model architecture and training
# hyperparameters for the final base model. This is the config that runs
# for 3-7 days on the RTX 4090.
#
# VRAM budget (GPU-resident CudaTransformerTrainer, RTX 4090 24GB):
#   24 blocks (weights+AdamW m+v+workspace): ~17 GB
#   LM head (weights+AdamW+logits):          ~1.5 GB
#   System (Xorg/desktop):                   ~1 GB
#   Total:                                  ~19.5 GB
#   Headroom:                                ~5 GB
#
# NOTE: seq=2048+batch=8 OOM'd at block 21 (stale GPU procs).
# seq=2048+batch=4 OOM'd at LM head (logits [4,2048,32768]=1GB too large).
# seq=1024+batch=4 fits: logits [4,1024,32768]=512MB, attention 4x smaller.

model:
  path: "."                                  # From scratch (random init)
  mode: transformer                         # LLM transformer mode
  architecture:
    hidden_size: 1024                       # d_model
    num_hidden_layers: 24
    num_attention_heads: 16                 # d_head = 64
    num_key_value_heads: 4                  # GQA 4:1 ratio
    intermediate_size: 4096                 # SwiGLU FFN (gate + up + down)
    vocab_size: 32768                       # ByteLevel BPE (v2 tokenizer)
    max_position_embeddings: 1024           # Context length (2048 OOM'd on 4090)
    rms_norm_eps: 1.0e-5

data:
  train: "data/pretokenized-2048/train/"      # Pre-tokenized with ByteLevel BPE v2, 2048-token chunks
  val: "data/pretokenized-2048/val/"
  batch_size: 4                             # Micro-batch (batch=8 OOM'd at LM head alloc)
  seq_len: 1024                            # Truncated from 2048 (OOM at full length)
  tokenizer: "models/albor-tokenizer-v2/tokenizer.json"
  input_column: "input_ids"                 # Pre-tokenized: List<u32> column

optimizer:
  name: "adamw"
  lr: 3.0e-4
  beta1: 0.9
  beta2: 0.95
  weight_decay: 0.1

training:
  mode: "causal_lm"
  epochs: 1                                 # Pre-training uses max_steps, not epochs
  grad_clip: 1.0
  lr_scheduler: "cosine"
  warmup_steps: 2000
  gradient_accumulation: 128                # Global batch = 4 * 128 * 1024 = 512K tokens
  mixed_precision: "fp16"
  output_dir: "./checkpoints/albor-base-350m"
  save_interval: 25
  max_steps: 5000                           # ~2.6B tokens (4*128*1024*5000)

monitoring:
  terminal:
    enabled: true
    refresh_rate: 1000
    metrics: ["loss", "learning_rate", "gradient_norm"]
    charts:
      - type: "loss_curve"
        metric: "loss"
        window: 100
        show_eta: true

  tracking:
    enabled: true
    backend: "sqlite"
    experiment: "albor-pretrain-350m"
    tags:
      model: "albor-350m"
      stage: "pretrain"
      data: "python-code-59M-tokens"

  system:
    enabled: true
    interval: 5000
    metrics: ["gpu_utilization", "memory", "temperature"]

  alerts:
    - condition: "loss > 10"
      action: "stop"
      message: "Loss exploded — Andon stop"
    - condition: "gradient_norm > 100"
      action: "stop"
      message: "Gradient explosion — Andon stop"
