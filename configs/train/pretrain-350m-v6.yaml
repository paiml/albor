# configs/train/pretrain-350m-v6.yaml — v6: ALB-092 fixes (norm grads + accum zeroing)
#
# Critical fixes from ALB-092:
# 1. RMSNorm backward now computes grad_gamma (trueno PR #178)
#    → 50 norm weights receive proper gradients (were pure decay in v3-v5)
# 2. GpuGradientAccumulator zeroed at init (entrenar PR #257)
#    → first optimizer step no longer corrupted by uninitialized VRAM
# 3. Checkpoint resume restores step counter (LR schedule + bias correction)
#
# Same architecture/hyperparams as v5. Fresh start from random init.
# Expected: faster convergence + lower final loss than v3/v4/v5 due to
# norm weights now being properly trained.
#
# Token budget: 20,000 steps × 32,768 tokens/step = 655M tokens
# ETA: ~24 hours at 7.7K tok/s

model:
  path: "."
  mode: transformer
  architecture:
    hidden_size: 1024
    num_hidden_layers: 24
    num_attention_heads: 16
    num_key_value_heads: 4
    intermediate_size: 4096
    vocab_size: 32768
    max_position_embeddings: 1024
    rms_norm_eps: 1.0e-5

data:
  train: "data/pretokenized-1024-v3/train/"
  val: "data/pretokenized-1024-v3/val/"
  batch_size: 4
  seq_len: 1024
  tokenizer: "models/albor-tokenizer-v2/tokenizer.json"
  input_column: "input_ids"

optimizer:
  name: "adamw"
  lr: 3.0e-4
  beta1: 0.9
  beta2: 0.95
  weight_decay: 0.1

training:
  mode: "causal_lm"
  epochs: 1
  grad_clip: 1.0
  lr_scheduler: "cosine"
  warmup_steps: 500
  gradient_accumulation: 8                     # 32K tokens/step (GPU-resident accum, ALB-091)
  output_dir: "./checkpoints/albor-base-350m-v6"
  save_interval: 500
  eval_interval: 250                          # ALB-087: Eval 2x per save interval
  patience: 10                                # ALB-087: Early stop after 10 evals without improvement
  max_steps: 20000                            # 20K × 32K = 655M tokens ≈ full epoch

monitoring:
  terminal:
    enabled: false

  tracking:
    enabled: false
    backend: "sqlite"
    experiment: "albor-pretrain-350m-v6"
    tags:
      model: "albor-350m"
      stage: "pretrain"
      data: "codeparrot-clean-5.3B"
      batch: "32K-tokens"
      fix: "ALB-092-norm-grads"

  system:
    enabled: false

  alerts:
    - condition: "loss > 10"
      action: "stop"
      message: "Loss exploded — Andon stop"
    - condition: "gradient_norm > 100"
      action: "stop"
      message: "Gradient explosion — Andon stop"
