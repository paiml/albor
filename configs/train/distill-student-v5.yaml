# configs/train/distill-student-v5.yaml — Distillation from v28/v29 checkpoint
#
# Phase B of the HumanEval pipeline (§6.4.2):
# 1. Teacher: Qwen3-Coder-30B-A3B generates completions for 50K prompts
# 2. Student: v28 or v29 best checkpoint fine-tunes on teacher completions
#
# Data pipeline (run BEFORE this config):
#   1. scripts/extract_distill_prompts.py → data/distill/prompts-filtered-50k.jsonl
#   2. apr distill --config distill-30b.yaml --stage precompute (teacher generates)
#   3. Pretokenize mixed corpus (80% synthetic + 20% filtered codeparrot)
#
# Key differences from distill-student-v4:
#   - Base model: v28/v29 checkpoint (val_ppl ~5-10) vs v15 (val_ppl ~309)
#   - 50K prompts from quality-filtered corpus vs 118 textbook prompts
#   - Lower LR (5e-5) — fine-tuning from a strong base, not rescuing a weak one
#
# UPDATE model.path to the best checkpoint before running:
#   v28: checkpoints/albor-base-350m-v28/model-best.apr
#   v29: checkpoints/albor-base-350m-v29/model-best.apr

model:
  path: "./checkpoints/albor-base-350m-v29/model-best.apr"
  mode: transformer
  architecture:
    hidden_size: 1024
    num_hidden_layers: 24
    num_attention_heads: 16
    num_key_value_heads: 4
    intermediate_size: 4096
    vocab_size: 32768
    max_position_embeddings: 1024
    rms_norm_eps: 1.0e-5
    rope_theta: 10000.0

data:
  train: "data/distill/mixed-v5/train/"
  val: "data/pretokenized-1024-v4/val/"
  batch_size: 4
  seq_len: 1024
  tokenizer: "models/albor-tokenizer-v2/tokenizer.json"
  input_column: "input_ids"

optimizer:
  name: "adamw"
  lr: 5.0e-5
  beta1: 0.9
  beta2: 0.95
  weight_decay: 0.01

training:
  mode: "causal_lm"
  epochs: 3
  grad_clip: 1.0
  lr_scheduler: "cosine"
  warmup_steps: 100
  gradient_accumulation: 8
  output_dir: "./checkpoints/albor-distill-v5"
  save_interval: 1000
  eval_interval: 200
  patience: 15
  max_steps: 10000
  seed: 42

monitoring:
  terminal: { enabled: false }
  tracking: { enabled: false }
  system: { enabled: false }
  alerts:
    - condition: "loss > 10"
      action: "stop"
      message: "Loss exploded"
    - condition: "gradient_norm > 100"
      action: "stop"
      message: "Gradient explosion"
