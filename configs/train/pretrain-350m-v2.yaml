# configs/train/pretrain-350m-v2.yaml — Albor 350M with expanded dataset
#
# Same model architecture as pretrain-350m.yaml but pointing to the expanded
# v2 dataset (Tier 1 upsampled 10x + Tier 2 at 1x, FIM 50% PSM).
#
# C-TRAINCFG-001 pre-flight verification:
#   num_sequences:    67,977 (v2 dataset)
#   steps_per_epoch:  floor(67977 / 4 / 1) = 16994
#   epochs:           1 (16994 steps per epoch >= 5000 max_steps)
#   warmup_steps:     500 (10% of max_steps, per C-TRAINCFG-001 <= 10% bound)
#
# Time estimate: 5000 steps × ~8.4s/step ÷ 3600 ≈ 11.7h
# (measured ~1.8s/seq at seq=1024, 4 seqs/step, ALB-067 per-block clip disabled)
#
# NOTE: gradient_accumulation=1. The CudaTransformerTrainer does per-sequence
# optimizer updates (per-block interleaved backward+optimize). True gradient
# accumulation is not implemented — increasing accum just increases total
# sequences processed per "step" without changing update granularity.
# ALB-066: reduced from 128→16→1.

model:
  path: "."                                  # From scratch (random init)
  mode: transformer
  architecture:
    hidden_size: 1024
    num_hidden_layers: 24
    num_attention_heads: 16
    num_key_value_heads: 4
    intermediate_size: 4096
    vocab_size: 32768
    max_position_embeddings: 1024
    rms_norm_eps: 1.0e-5

data:
  train: "data/pretokenized-2048-v2/train/"
  val: "data/pretokenized-2048/val/"           # Reuse v1 validation set
  batch_size: 4
  seq_len: 1024
  tokenizer: "models/albor-tokenizer-v2/tokenizer.json"
  input_column: "input_ids"

optimizer:
  name: "adamw"
  lr: 3.0e-4
  beta1: 0.9
  beta2: 0.95
  weight_decay: 0.1

training:
  mode: "causal_lm"
  epochs: 1                                  # C-TRAINCFG-001: steps_per_epoch=16994 >= max_steps=5000
  # grad_clip: 1.0                            # ALB-067: disabled, CPU-side L2 norm bottleneck
  lr_scheduler: "cosine"
  warmup_steps: 500                          # C-TRAINCFG-001: warmup_fraction = 500/5000 = 10%
  gradient_accumulation: 1                   # ALB-066: per-sequence optimizer (no true accum in CUDA trainer)
  mixed_precision: "fp16"
  output_dir: "./checkpoints/albor-base-350m-v2"
  save_interval: 250
  max_steps: 5000

monitoring:
  terminal:
    enabled: false                              # ALB-067: blocks under nohup (no tty)
    refresh_rate: 1000
    metrics: ["loss", "learning_rate", "gradient_norm"]
    charts:
      - type: "loss_curve"
        metric: "loss"
        window: 100
        show_eta: true

  tracking:
    enabled: false                              # ALB-067: disabled for nohup compatibility
    backend: "sqlite"
    experiment: "albor-pretrain-350m-v2"
    tags:
      model: "albor-350m"
      stage: "pretrain"
      data: "python-code-expanded-v2"

  system:
    enabled: false                              # ALB-067: disabled for nohup compatibility
    interval: 5000
    metrics: ["gpu_utilization", "memory", "temperature"]

  alerts:
    - condition: "loss > 10"
      action: "stop"
      message: "Loss exploded — Andon stop"
    - condition: "gradient_norm > 100"
      action: "stop"
      message: "Gradient explosion — Andon stop"
