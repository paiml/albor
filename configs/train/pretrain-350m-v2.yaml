# configs/train/pretrain-350m-v2.yaml — Albor 350M with expanded dataset
#
# Same model architecture as pretrain-350m.yaml but pointing to the expanded
# v2 dataset (Tier 1 upsampled 10x + Tier 2 at 1x, FIM 50% PSM).
#
# C-TRAINCFG-001 pre-flight verification:
#   num_sequences:    ~45K+ (v2 dataset, up from 22K)
#   steps_per_epoch:  floor(N / 4 / 128) — compute after pretokenize completes
#   epochs:           set to ensure total_achievable_steps >= max_steps
#   warmup_steps:     2000 (must be < total_achievable_steps)
#
# NOTE: epochs value must be updated after pretokenize produces final sequence count.
# Use: min_epochs = ceil(5000 / floor(num_sequences / 4 / 128))

model:
  path: "."                                  # From scratch (random init)
  mode: transformer
  architecture:
    hidden_size: 1024
    num_hidden_layers: 24
    num_attention_heads: 16
    num_key_value_heads: 4
    intermediate_size: 4096
    vocab_size: 32768
    max_position_embeddings: 1024
    rms_norm_eps: 1.0e-5

data:
  train: "data/pretokenized-2048-v2/train/"
  val: "data/pretokenized-2048/val/"           # Reuse v1 validation set
  batch_size: 4
  seq_len: 1024
  tokenizer: "models/albor-tokenizer-v2/tokenizer.json"
  input_column: "input_ids"

optimizer:
  name: "adamw"
  lr: 3.0e-4
  beta1: 0.9
  beta2: 0.95
  weight_decay: 0.1

training:
  mode: "causal_lm"
  epochs: 38                                 # C-TRAINCFG-001: ceil(5000 / 132) = 38
                                             # steps_per_epoch = floor(67977 / 4 / 128) = 132
                                             # 38 epochs × 132 = 5016 achievable steps >= 5000
  grad_clip: 1.0
  lr_scheduler: "cosine"
  warmup_steps: 500                          # C-TRAINCFG-001: warmup_fraction = 500/5000 = 10%
                                             # (2000 was 40% — violates bound, wastes training at low LR)
  gradient_accumulation: 128
  mixed_precision: "fp16"
  output_dir: "./checkpoints/albor-base-350m-v2"
  save_interval: 25
  max_steps: 5000

monitoring:
  terminal:
    enabled: true
    refresh_rate: 1000
    metrics: ["loss", "learning_rate", "gradient_norm"]
    charts:
      - type: "loss_curve"
        metric: "loss"
        window: 100
        show_eta: true

  tracking:
    enabled: true
    backend: "sqlite"
    experiment: "albor-pretrain-350m-v2"
    tags:
      model: "albor-350m"
      stage: "pretrain"
      data: "python-code-expanded-v2"

  system:
    enabled: true
    interval: 5000
    metrics: ["gpu_utilization", "memory", "temperature"]

  alerts:
    - condition: "loss > 10"
      action: "stop"
      message: "Loss exploded — Andon stop"
    - condition: "gradient_norm > 100"
      action: "stop"
      message: "Gradient explosion — Andon stop"
