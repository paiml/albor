# configs/train/pretrain-350m-manifest.yaml
#
# Entrenar YAML manifest format for the Albor 350M pre-training config.
# Uses the architecture: section to specify custom model params (ALB-021).
# Uses human-readable shorthand for sizes (ALB-022): "1K" = 1024, "32K" = 32768.
#
# Equivalent to pretrain-350m.yaml but in the declarative manifest format
# that flows through the bridge converter with architecture overrides.

entrenar: "1.0"
name: "albor-pretrain-350m"
version: "1.0.0"
description: "Albor 350M LLaMA-style pre-training on 10B Python tokens"
seed: 42

model:
  source: "./models/albor-base"
  architecture:
    type: transformer
    hidden_size: "1K"                        # 1024 (d_model)
    num_layers: 24
    num_heads: 16                            # d_head = 64
    num_kv_heads: 4                          # GQA 4:1 ratio
    intermediate_size: "4K"                  # 4096, SwiGLU FFN
    vocab_size: "32K"                        # 32768, power of 2 for GPU efficiency
    max_seq_length: "2K"                     # 2048, context length
    rms_norm_eps: 1.0e-5
    rope_theta: 10000.0
    use_bias: false

data:
  source: "data/tokenized/train/"
  val: "data/tokenized/val/"
  tokenizer: "models/albor-tokenizer/tokenizer.json"
  seq_len: "2K"                              # 2048
  input_column: "text"
  loader:
    batch_size: 8
    shuffle: true

optimizer:
  name: adamw
  lr: 3.0e-4
  betas: [0.9, 0.95]
  weight_decay: 0.1

scheduler:
  name: cosine
  warmup:
    steps: 2000

training:
  epochs: 1
  gradient:
    clip_norm: 1.0
    accumulation_steps: 32
  mixed_precision:
    enabled: true
    dtype: fp16
  checkpoint:
    save_every: 1000

output:
  dir: "./checkpoints/albor-base-350m"
