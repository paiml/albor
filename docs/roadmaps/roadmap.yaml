  item_type: task
  title: 'ALB-102: KV cache GQA over-allocation — 8x waste for grouped query attention'
  status: completed
  priority: medium
  assigned_to: null
  created: 2026-03-09T10:43:12Z
  updated: 2026-03-09T11:47:51Z
  spec: null
  acceptance_criteria:
  - 'KV cache uses num_heads (query) instead of num_kv_heads for KV dimension. Albor 350M: 4x over-alloc (16 vs 4 heads). Qwen3-Coder: 8x (16 vs 2). Fix: use num_kv_heads for KV cache sizing. GH #75.'
  phases: []
  subtasks: []
  estimated_effort: null
  labels:
  - realizar
  - memory
  - ALB-099
  notes: null
- id: PMAT-067
  github_issue: null
  item_type: task
  title: 'ALB-103: sample_topk per-token allocation — 2.4 MB churn per generated token'
  status: completed
  priority: medium
  assigned_to: null
  created: 2026-03-09T10:43:15Z
  updated: 2026-03-09T11:47:51Z
  spec: null
  acceptance_criteria:
  - 'sample_topk() allocates Vec<(f32,u32)> of vocab_size on every token. 32768 × 8 = 256 KB/call, ~2.4 MB with sorting. Over 512 tokens = 1.2 GB churn. Fix: pre-allocated SamplingState buffer, reused across generations. GH #76.'
  phases: []
  subtasks: []
  estimated_effort: null
  labels:
  - realizar
  - memory
  - ALB-099
  notes: null
