  item_type: task
  title: 'ALB-104: AprV2Reader::from_bytes() double copy on deserialization'
  status: completed
  priority: low
  assigned_to: null
  created: 2026-03-09T10:43:18Z
  updated: 2026-03-09T11:47:51Z
  spec: null
  acceptance_criteria:
  - 'from_bytes() copies bytes→Vec<u8>, then downstream converts Vec<u8>→Vec<f32>. For 350M model: 2.8 GB redundant copies. Fix: zero-copy borrowed slices or single-pass bytes→f32. GH #77.'
