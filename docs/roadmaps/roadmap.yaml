  item_type: task
  title: 'ALB-100: LMBatch input/target deduplication — 50% token memory wasted'
  status: completed
  priority: high
  assigned_to: null
  created: 2026-03-09T10:43:05Z
  updated: 2026-03-09T11:47:51Z
  spec: null
  acceptance_criteria:
  - 'LMBatch stores both input and target token vectors where target[i]=input[i+1]. For seq length S, this duplicates S-1 tokens. At 5.0B tokens: 18.7 GB redundant. Fix: store single tokens vec, derive input/target as slices. GH #73.'
  phases: []
  subtasks: []
  estimated_effort: null
  labels:
  - entrenar
  - memory
  - ALB-099
  notes: null
