  item_type: task
  title: 'ALB-101: Streaming Parquet loader — 37 GB eager dataset loading'
  status: completed
  priority: high
  assigned_to: null
  created: 2026-03-09T10:43:08Z
  updated: 2026-03-09T11:47:51Z
  spec: null
  acceptance_criteria:
  - 'load_lm_batches_from_parquet() eagerly loads ALL 19 shards (37 GB peak) before training. StreamingParquetLoader exists but unused. Fix: load one shard at a time (~1 GB), create batches, train, drop, next. Peak 37 GB → 4 GB. GH #74.'
  phases: []
