name: Validate Configs & Contracts

on:
  push:
    branches: [main]
    paths:
      - 'configs/**'
      - 'contracts/**'
      - 'Makefile'
      - '.github/workflows/validate.yml'
  pull_request:
    paths:
      - 'configs/**'
      - 'contracts/**'
      - 'Makefile'

jobs:
  validate-yaml:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate YAML syntax
        run: |
          echo "--- Validating config YAML syntax ---"
          for f in configs/**/*.yaml configs/*.yaml; do
            echo "  $f"
            python3 -c "import yaml; yaml.safe_load(open('$f'))" || exit 1
          done
          echo "--- Validating contract YAML syntax ---"
          for f in contracts/*.yaml; do
            echo "  $f"
            python3 -c "import yaml; yaml.safe_load(open('$f'))" || exit 1
          done
          echo "All YAML files parse successfully"

  validate-contracts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install pv (provable-contracts)
        run: cargo install --git https://github.com/paiml/provable-contracts provable-contracts-cli

      - name: Validate contracts with pv
        run: |
          echo "--- pv validate ---"
          for f in contracts/*.yaml; do
            echo "  Validating: $f"
            pv validate "$f"
          done
          echo ""
          echo "--- pv coverage ---"
          pv coverage contracts
          echo ""
          echo "--- pv graph ---"
          pv graph contracts

  validate-forjar:
    runs-on: ubuntu-latest
    # forjar has local path deps (provable-contracts-macros) not yet on crates.io
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install forjar
        run: cargo install --git https://github.com/paiml/forjar forjar

      - name: Validate infra manifest with forjar
        run: |
          echo "--- forjar validate (infra-only) ---"
          forjar validate -f configs/pipeline/infra-only.yaml
          echo ""
          echo "--- forjar graph ---"
          forjar graph -f configs/pipeline/infra-only.yaml

  validate-playbook:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install batuta
        run: cargo install --git https://github.com/paiml/batuta batuta

      - name: Validate batuta playbook
        run: |
          echo "--- batuta playbook validate ---"
          batuta playbook validate configs/pipeline/albor-playbook.yaml

  lint-makefile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install bashrs
        run: cargo install bashrs

      - name: Lint Makefile with bashrs
        run: |
          echo "--- bashrs make lint ---"
          bashrs make lint Makefile || true
          echo ""
          echo "--- bashrs classify ---"
          bashrs classify Makefile
