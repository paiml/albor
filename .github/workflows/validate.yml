name: Validate Configs & Contracts

on:
  push:
    branches: [main]
    paths:
      - 'configs/**'
      - 'contracts/**'
      - 'scripts/**'
      - 'docs/book/**'
      - 'Makefile'
      - '.github/workflows/validate.yml'
  pull_request:
    paths:
      - 'configs/**'
      - 'contracts/**'
      - 'scripts/**'
      - 'docs/book/**'
      - 'Makefile'

jobs:
  validate-yaml:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate YAML syntax
        run: |
          echo "--- Validating config YAML syntax ---"
          for f in configs/**/*.yaml configs/*.yaml; do
            echo "  $f"
            python3 -c "import yaml; yaml.safe_load(open('$f'))" || exit 1
          done
          echo "--- Validating contract YAML syntax ---"
          for f in contracts/*.yaml; do
            echo "  $f"
            python3 -c "import yaml; yaml.safe_load(open('$f'))" || exit 1
          done
          echo "All YAML files parse successfully"

  validate-contracts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install pv (provable-contracts)
        run: cargo install --git https://github.com/paiml/provable-contracts provable-contracts-cli

      - name: Validate contracts with pv
        run: |
          echo "--- pv validate ---"
          for f in contracts/*.yaml; do
            echo "  Validating: $f"
            pv validate "$f"
          done
          echo ""
          echo "--- pv coverage ---"
          pv coverage contracts
          echo ""
          echo "--- pv graph ---"
          pv graph contracts

  validate-forjar:
    runs-on: ubuntu-latest
    # forjar has local path deps (provable-contracts-macros) not yet on crates.io
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install forjar
        run: cargo install --git https://github.com/paiml/forjar forjar

      - name: Validate infra manifest with forjar
        run: |
          echo "--- forjar validate (infra-only) ---"
          forjar validate -f configs/pipeline/infra-only.yaml
          echo ""
          echo "--- forjar graph ---"
          forjar graph -f configs/pipeline/infra-only.yaml

  validate-playbook:
    runs-on: ubuntu-latest
    # batuta has local path deps (trueno-rag) not yet on crates.io
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install batuta
        run: cargo install --git https://github.com/paiml/batuta batuta

      - name: Validate batuta playbook
        run: |
          echo "--- batuta playbook validate ---"
          batuta playbook validate configs/pipeline/albor-playbook.yaml

  lint-makefile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install bashrs
        run: cargo install bashrs

      - name: Lint Makefile with bashrs
        run: |
          echo "--- bashrs make lint ---"
          bashrs make lint Makefile || true
          echo ""
          echo "--- bashrs classify ---"
          bashrs classify Makefile

  build-book:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install mdBook
        run: |
          mkdir -p /tmp/mdbook
          curl -sSL https://github.com/rust-lang/mdBook/releases/download/v0.4.40/mdbook-v0.4.40-x86_64-unknown-linux-gnu.tar.gz | tar xz -C /tmp/mdbook
          echo "/tmp/mdbook" >> $GITHUB_PATH

      - name: Build mdBook
        run: cd docs/book && mdbook build

  validate-scripts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Validate Python scripts syntax
        run: |
          for f in scripts/*.py; do
            echo "  Checking: $f"
            python3 -c "import ast; ast.parse(open('$f').read())" || exit 1
          done
          echo "All Python scripts parse successfully"

  validate-eval-benchmarks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Validate eval benchmarks (canonical solutions)
        run: |
          echo "--- python-intermediate (15 problems) ---"
          python3 scripts/eval-code.py configs/eval/python-intermediate.jsonl --validate-only
          echo ""
          echo "--- humaneval-subset (20 problems) ---"
          python3 scripts/eval-code.py configs/eval/humaneval-subset.jsonl --validate-only

  quality-gates:
    name: Quality gates (pmat + TDG)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install pmat
        run: cargo install pmat || true

      - name: Run pmat quality analysis
        run: |
          echo "--- pmat TDG analysis ---"
          pmat index . 2>/dev/null || true
          pmat summary 2>/dev/null || echo "pmat: spec repo (minimal Rust sources)"
          echo ""
          echo "--- Quality targets ---"
          echo "Contracts: $(ls contracts/*.yaml | wc -l) YAML contracts"
          echo "Rust tests: $(grep -c '#\[test\]' tests/sovereign_stack.rs) integration tests"
          echo "CI workflows: $(ls .github/workflows/*.yml | wc -l) workflows"
