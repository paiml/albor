# ring-allreduce-kernel-v1.yaml — C-RING-001
#
# Provable contract for ring AllReduce correctness over TCP.
# Validates that output equals arithmetic mean of all inputs,
# with optimal bandwidth utilization.

metadata:
  version: "1.0.0"
  created: "2026-03-03"
  author: "PAIML Engineering"
  description: "Ring AllReduce — scatter-reduce + all-gather correctness and bandwidth optimality"
  references:
    - "Patarasuk & Yuan (2009) 'Bandwidth Optimal All-Reduce Algorithms for Clusters of Workstations'"
    - "Baidu ring-allreduce (2017)"
    - "NCCL ring algorithm"
  depends_on: []

equations:
  scatter_reduce:
    formula: |
      Input: N workers, each with vector x_w of length D
      Partition x_w into N chunks: x_w = [c_w_0, c_w_1, ..., c_w_{N-1}]
      Each chunk has length ceil(D/N) (last chunk may be shorter)

      For round r in [0, N-1):
        Worker w sends chunk (w-r) mod N to worker (w+1) mod N
        Worker w receives chunk (w-r-1) mod N from worker (w-1) mod N
        Worker w element-wise adds received chunk to local chunk (w-r-1) mod N

      After N-1 rounds: worker w holds the sum of chunk w from all workers
    domain: |
      N: world_size >= 2
      D: gradient vector length
      x_w: local gradient on worker w, Vec<f32>
    codomain: "Each worker holds the global sum of one chunk"
    invariants:
      - "Ring topology: worker w sends to (w+1) mod N, receives from (w-1) mod N"
      - "Exactly N-1 rounds for scatter-reduce phase"
      - "Element-wise addition preserves f32 precision (no reordering)"

  all_gather:
    formula: |
      After scatter-reduce, worker w holds reduced_chunk[w].
      For round r in [0, N-1):
        Worker w sends reduced_chunk[(w-r+1) mod N] to worker (w+1) mod N
        Worker w receives reduced_chunk[(w-r) mod N] from worker (w-1) mod N

      After N-1 rounds: all workers hold all reduced chunks → full reduced vector
    domain: "Partially reduced vectors from scatter-reduce"
    codomain: "All workers hold identical full reduced vector"
    invariants:
      - "Same ring topology as scatter-reduce"
      - "Exactly N-1 rounds for all-gather phase"
      - "No arithmetic — only data forwarding"

  averaging:
    formula: |
      After all-gather, divide by N:
        result = reduced_vector / N
      This gives: result[i] = (1/N) * sum_{w=0}^{N-1} x_w[i]
    domain: "Full reduced (summed) vector"
    codomain: "Arithmetic mean of all input vectors"
    invariants:
      - "Division by N applied once, after all-gather completes"
      - "Division is element-wise"

  bandwidth_optimality:
    formula: |
      Total data sent per worker = 2 * (N-1)/N * D * sizeof(f32)
      For N=2: 1.0 * D * 4 bytes (each worker sends entire vector once)
      For N=4: 1.5 * D * 4 bytes
      Theoretical lower bound for AllReduce: 2 * (N-1)/N * D * sizeof(f32)
      Ring AllReduce achieves this bound exactly.
    domain: "N workers, D-length f32 vectors"
    codomain: "Bytes transferred per worker"
    invariants:
      - "Ring AllReduce is bandwidth-optimal for any N"
      - "Latency is 2*(N-1) rounds — not latency-optimal for large N"
      - "For pretraining (D ~ 700K per block), bandwidth dominates"

  two_worker_degeneration:
    formula: |
      For N=2, ring AllReduce degenerates to:
        1. Scatter-reduce: 1 round, each worker sends D/2 elements, receives D/2
        2. All-gather: 1 round, each worker sends D/2, receives D/2
      Equivalent to: swap halves, sum locally, swap back
      Or simply: send full vector, receive full vector, average
    domain: "N=2, D-length vectors"
    codomain: "Identical to naive send-and-average"
    invariants:
      - "Total communication: D * sizeof(f32) per worker"
      - "2 rounds total (1 scatter-reduce + 1 all-gather)"

proof_obligations:
  - type: invariant
    property: "AllReduce output equals mean of inputs"
    formal: "forall i in [0, D): result[i] == (1/N) * sum_{w=0}^{N-1} x_w[i]"
    tolerance: 1.0e-6

  - type: invariant
    property: "All workers produce identical output"
    formal: "forall w1 w2 in [0, N): result(w1) == result(w2)"
    tolerance: 0
    applies_to: all_gather

  - type: bound
    property: "Bandwidth usage is optimal"
    formal: "bytes_per_worker == 2 * (N-1)/N * D * 4"

  - type: invariant
    property: "No deadlock under TCP"
    formal: "Simultaneous send+recv in each round avoids circular wait"
    tolerance: 0
    applies_to: scatter_reduce

  - type: bound
    property: "Latency for pretraining block gradients"
    formal: "allreduce_time < 10ms for D=700K, N=2 on localhost"
    tolerance: 5.0e-3

falsification_tests:
  - id: FALSIFY-RING-001
    rule: "AllReduce of identical vectors returns that vector"
    prediction: "All workers send [1.0, 2.0, 3.0] → output is [1.0, 2.0, 3.0]"
    test: |
      N=3 workers, all send [1.0, 2.0, 3.0]
      Expected: [1.0, 2.0, 3.0] (mean of identical inputs = input)
      Tolerance: exact (f32 addition of identical values)
    if_fails: "Ring AllReduce corrupts data during scatter-reduce or all-gather"

  - id: FALSIFY-RING-002
    rule: "AllReduce produces correct mean for distinct inputs"
    prediction: "Workers send [1,0,0], [0,1,0], [0,0,1] → output is [1/3, 1/3, 1/3]"
    test: |
      N=3 workers
      w0: [1.0, 0.0, 0.0]
      w1: [0.0, 1.0, 0.0]
      w2: [0.0, 0.0, 1.0]
      Expected: [0.333..., 0.333..., 0.333...]
      Tolerance: 1e-6 relative
    if_fails: "Element-wise reduction is incorrect"

  - id: FALSIFY-RING-003
    rule: "AllReduce handles non-divisible vector lengths"
    prediction: "D=7, N=3 → chunks of [3, 2, 2], AllReduce still correct"
    test: |
      N=3, D=7
      w0: [1,2,3,4,5,6,7]
      w1: [7,6,5,4,3,2,1]
      w2: [0,0,0,0,0,0,0]
      Expected: [8/3, 8/3, 8/3, 8/3, 8/3, 8/3, 8/3]
      Tolerance: 1e-5 relative
    if_fails: "Chunk padding/unpadding is incorrect"

  - id: FALSIFY-RING-004
    rule: "Two-worker degeneration matches naive averaging"
    prediction: "Ring AllReduce with N=2 produces same result as (x0+x1)/2"
    test: |
      N=2, D=100000
      w0: random f32 vector (seed 42)
      w1: random f32 vector (seed 43)
      ring_result = ring_allreduce(w0, w1)
      naive_result = (w0 + w1) / 2
      Assert max_abs_diff < 1e-6
    if_fails: "Two-worker special case is incorrectly optimized"

  - id: FALSIFY-RING-005
    rule: "No deadlock under TCP with simultaneous send+recv"
    prediction: "Ring AllReduce completes within timeout for N=4 workers on localhost"
    test: |
      Spawn N=4 workers connected via TCP on localhost.
      Each worker holds a D=10000 f32 vector.
      Run ring AllReduce with a 10-second timeout.
      Assert all workers complete within the timeout.
      Assert results are correct (equal to mean of inputs).
      Repeat 100 times to detect intermittent deadlocks.
    if_fails: "Circular wait in TCP send/recv — workers block waiting on each other in the ring"

kani_harnesses:
  - id: KANI-RING-001
    obligation: scatter_reduce
    property: "Scatter-reduce produces correct partial sums for bounded N and D"
    bound: 4
    strategy: stub_float
    harness: verify_scatter_reduce_correctness

  - id: KANI-RING-002
    obligation: all_gather
    property: "All workers hold identical output after all-gather"
    bound: 4
    strategy: stub_float
    harness: verify_all_gather_identical_output

  - id: KANI-RING-003
    obligation: averaging
    property: "Final output equals arithmetic mean of all inputs"
    bound: 4
    strategy: stub_float
    harness: verify_allreduce_mean

qa_gate:
  id: F-RING-001
  name: "Ring AllReduce Correctness"
  min_coverage: 0.90
  max_complexity: 15
  required_tests:
    - "allreduce_identical_vectors_returns_input"
    - "allreduce_distinct_vectors_returns_mean"
    - "allreduce_non_divisible_vector_length"
    - "two_worker_degeneration_matches_naive"
