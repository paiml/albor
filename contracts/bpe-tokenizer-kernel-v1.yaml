# bpe-tokenizer-kernel-v1.yaml — ALB-014
#
# Provable contract for BPE tokenizer encode/decode.
# The critical invariant: decode(encode(x)) = x for all valid UTF-8 input.

contract:
  name: "bpe-tokenizer-kernel"
  version: "1.0"
  component: "aprender"
  gap_id: "ALB-014"
  priority: "high"

equations:
  roundtrip:
    latex: "\\text{decode}(\\text{encode}(x)) = x \\quad \\forall x \\in \\text{UTF-8}"
    description: "Lossless roundtrip: any valid UTF-8 string survives encode-decode"

  bpe_merge:
    latex: "\\text{merge}(a, b) = ab \\text{ where } (a,b) = \\arg\\min_{(p,q) \\in \\text{pairs}} \\text{rank}(p,q)"
    description: "BPE greedily merges the highest-priority byte pair at each step"

obligations:
  - id: "TOK-001"
    name: "Roundtrip invariant"
    level: 4                               # Kani bounded model check
    property: "decode(encode(x)) = x for all valid UTF-8 strings"
    test: "proptest with 10000 random UTF-8 strings (including edge cases: empty, single byte, multi-byte, emoji)"
    falsification: "Custom roundtrip test on all training data"

  - id: "TOK-002"
    name: "Vocab coverage"
    level: 3
    property: "Every byte value 0x00-0xFF is representable (byte-level fallback)"
    test: "Encode every single-byte string, assert no UNK token produced"

  - id: "TOK-003"
    name: "Merge ordering determinism"
    level: 3
    property: "Same input always produces same token sequence (deterministic)"
    test: "Encode same string 1000 times, assert all outputs identical"

  - id: "TOK-004"
    name: "Vocab size correctness"
    level: 2
    property: "Trained tokenizer has exactly vocab_size tokens"
    test: "Assert len(tokenizer.vocab) == 32768"

  - id: "TOK-005"
    name: "Special token handling"
    level: 3
    property: "FIM sentinel tokens (<fim_prefix>, <fim_suffix>, <fim_middle>) are single tokens"
    test: "Encode each sentinel, assert output is exactly one token ID"

  - id: "TOK-006"
    name: "Empty input"
    level: 2
    property: "encode('') returns empty sequence, decode([]) returns ''"
    test: "Direct assertion"

inputs:
  text:
    type: "String"
    constraints: "valid UTF-8"

  token_ids:
    type: "Vec<u32>"
    constraints: "all values in [0, vocab_size)"

outputs:
  encoded:
    type: "Vec<u32>"
    constraints: "all values in [0, vocab_size), length <= input bytes"

  decoded:
    type: "String"
    constraints: "valid UTF-8"
