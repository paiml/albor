# bpe-tokenizer-kernel-v1.yaml — ALB-014
#
# Provable contract for BPE tokenizer encode/decode.
# Critical invariant: decode(encode(x)) = x for all valid UTF-8 input.

metadata:
  version: "1.0.0"
  created: "2026-03-01"
  author: "PAIML Engineering"
  description: "BPE tokenizer kernel — byte-pair encoding with lossless roundtrip"
  references:
    - "Sennrich et al. (2016) Neural Machine Translation of Rare Words with Subword Units"
    - "Gage (1994) A New Algorithm for Data Compression"

equations:
  roundtrip:
    formula: "decode(encode(x)) = x for all x in UTF-8"
    domain: "x: valid UTF-8 string"
    codomain: "encode(x): Vec<u32> where each id in [0, V)"
    invariants:
      - "Lossless roundtrip for all valid UTF-8"
      - "Empty input maps to empty output"
      - "Byte-level fallback ensures all byte values representable"

  bpe_merge:
    formula: "merge(a, b) = ab where (a,b) = argmin_{(p,q) in pairs} rank(p,q)"
    domain: "token sequence with adjacent pairs"
    codomain: "shorter token sequence"
    invariants:
      - "Each merge reduces sequence length by at least 1"
      - "Merge ordering is deterministic"
      - "Final sequence uses only tokens in vocabulary"

proof_obligations:
  - type: invariant
    property: "Roundtrip lossless"
    formal: "decode(encode(x)) = x for all valid UTF-8 x"
    applies_to: all

  - type: invariant
    property: "Byte-level completeness"
    formal: "Every byte value 0x00-0xFF is representable (no UNK)"
    applies_to: all

  - type: idempotency
    property: "Deterministic encoding"
    formal: "encode(x) = encode(x) for repeated calls on same input"
    applies_to: all

  - type: invariant
    property: "Vocab size correctness"
    formal: "len(tokenizer.vocab) = V (configured vocab size)"
    applies_to: all

  - type: invariant
    property: "FIM sentinel tokens are atomic"
    formal: "encode(<fim_prefix>) returns exactly one token ID"
    applies_to: all

  - type: invariant
    property: "Empty input handling"
    formal: "encode('') = [] and decode([]) = ''"
    applies_to: all

kernel_structure:
  phases:
    - name: byte_encode
      description: "Convert UTF-8 string to byte sequence"
      invariant: "bytes are valid UTF-8 representation"
    - name: initial_tokenize
      description: "Map bytes to initial token IDs (byte-level)"
      invariant: "all bytes have a token mapping"
    - name: bpe_merge
      description: "Iteratively apply BPE merge rules in priority order"
      invariant: "sequence length decreases monotonically"
    - name: output
      description: "Return final token ID sequence"
      invariant: "all IDs in [0, vocab_size)"

falsification_tests:
  - id: FALSIFY-TOK-001
    rule: "Roundtrip invariant"
    prediction: "decode(encode(x)) = x for random UTF-8 strings"
    test: "proptest with 10000 random UTF-8 strings including edge cases"
    if_fails: "Merge rule corrupts byte boundaries or special chars"

  - id: FALSIFY-TOK-002
    rule: "Byte completeness"
    prediction: "Every single-byte string encodes without UNK"
    test: "Encode all 256 single-byte strings, assert no UNK token"
    if_fails: "Byte-level fallback tokens missing from vocabulary"

  - id: FALSIFY-TOK-003
    rule: "Determinism"
    prediction: "Same input always produces same tokens"
    test: "Encode same string 1000 times, assert all outputs identical"
    if_fails: "Non-deterministic merge ordering (HashMap or thread race)"

  - id: FALSIFY-TOK-004
    rule: "FIM sentinels"
    prediction: "Each FIM sentinel token encodes to exactly one token"
    test: "Encode <fim_prefix>, <fim_suffix>, <fim_middle>, check length = 1"
    if_fails: "Sentinel tokens not added to vocabulary as special tokens"

  - id: FALSIFY-TOK-005
    rule: "Vocab size correctness"
    prediction: "len(tokenizer.vocab) equals configured vocab size V exactly"
    test: |
      Build tokenizer with V=32000. Assert len(tokenizer.vocab) == 32000.
      Build tokenizer with V=50257. Assert len(tokenizer.vocab) == 50257.
      Verify no off-by-one from special token insertion.
    if_fails: "Special tokens (FIM, BOS, EOS, PAD) alter vocab size or merge rules produce extra entries"

  - id: FALSIFY-TOK-006
    rule: "Empty input handling"
    prediction: "encode('') returns [] and decode([]) returns ''"
    test: |
      Assert encode("") == [] (empty token list).
      Assert decode([]) == "" (empty string).
      Assert encode("") followed by decode produces "" (roundtrip on empty).
    if_fails: "Edge case not handled — empty input produces BOS/EOS tokens or panics"

kani_harnesses:
  - id: KANI-TOK-001
    obligation: TOK-INV-001
    property: "Roundtrip for bounded-length strings"
    bound: 16
    strategy: exhaustive
    harness: verify_roundtrip_bounded

qa_gate:
  id: F-TOK-001
  name: "BPE Tokenizer Contract"
  description: "Tokenizer correctness for Albor vocabulary"
  checks:
    - "roundtrip_lossless"
    - "byte_completeness"
    - "deterministic_encoding"
    - "fim_sentinel_atomic"
  pass_criteria: "All 4 falsification tests pass + Kani roundtrip harness verifies"
  falsification: "Corrupt one merge rule to verify roundtrip detection"
