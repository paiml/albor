# Contract: Cosine Learning Rate Schedule (ALB-079)
#
# Ensures the CUDA trainer applies cosine decay after warmup.
# Written because ALB-079 identified constant lr in CUDA path.

metadata:
  version: "1.0.0"
  description: "Cosine LR schedule — warmup then cosine decay to zero"
  references:
    - "ALB-079"
    - "Loshchilov & Hutter (2017) SGDR: Stochastic Gradient Descent with Warm Restarts"

equations:
  warmup_lr:
    formula: "lr(step) = lr_max * (step / warmup_steps)"
    domain: "0 <= step < warmup_steps"
    invariants:
      - "LR is monotonically increasing during warmup"
      - "lr(0) = 0"

  cosine_decay_lr:
    formula: "lr(step) = 0.5 * lr_max * (1 + cos(pi * (step - warmup_steps) / (max_steps - warmup_steps)))"
    domain: "warmup_steps <= step < max_steps"
    invariants:
      - "LR is always in [0, lr_max]"
      - "LR is continuous at warmup boundary"
      - "lr(max_steps) = 0"

  lr_propagation:
    formula: "adamw_kernel.lr == embed_optimizer.lr == current_lr(step)"
    domain: "Every training step"
    invariants:
      - "GPU AdamW kernel receives same lr as current_lr()"
      - "CPU embedding optimizer lr matches current_lr() at each step"

proof_obligations:
  - type: invariant
    property: "current_lr() returns cosine-decayed lr after warmup"
    formal: "For step >= warmup_steps: lr = 0.5 * lr_max * (1 + cos(pi * progress))"

  - type: bound
    property: "lr at step 0 is 0 (or near 0)"
    formal: "current_lr(0) < 1e-10"

  - type: invariant
    property: "lr at warmup_steps equals lr_max"
    formal: "abs(current_lr(warmup_steps) - lr_max) < 1e-10"

  - type: bound
    property: "lr at max_steps is 0"
    formal: "current_lr(max_steps) < 1e-10"

  - type: invariant
    property: "CPU embedding optimizer receives updated lr before each step"
    formal: "embed_optimizer.lr == current_lr(step) at every optimizer_step()"

falsification_tests:
  - id: FALSIFY-COSINE-001
    rule: "lr at midpoint of cosine decay equals 0.5 * lr_max"
    prediction: "At step 550 (midpoint), lr = 1.5e-4 for lr_max=3e-4"
    test: |
      Given: warmup_steps=100, max_steps=1000, lr_max=3e-4
      At step 550 (midpoint of decay phase):
        expected_lr = 0.5 * 3e-4 * (1 + cos(pi * 450/900))
                    = 0.5 * 3e-4 * (1 + cos(pi/2))
                    = 0.5 * 3e-4 * 1.0
                    = 1.5e-4
      Assert: abs(current_lr() - 1.5e-4) < 1e-8
    if_fails: "Cosine decay formula is incorrect"

  - id: FALSIFY-COSINE-002
    rule: "lr is NOT constant after warmup"
    prediction: "lr at step 200 > lr at step 800"
    test: |
      Given: warmup_steps=100, max_steps=1000, lr_max=3e-4
      At step 200: lr1 = current_lr()
      At step 800: lr2 = current_lr()
      Assert: lr1 != lr2
      Assert: lr1 > lr2 (cosine decay is monotonically decreasing)
    if_fails: "Regression to constant lr after warmup (ALB-079 recurrence)"

  - id: FALSIFY-COSINE-003
    rule: "lr forms decreasing sequence after warmup through max_steps"
    prediction: "lr(999) < 0.01 * lr_max"
    test: |
      Given: warmup_steps=100, max_steps=1000, lr_max=3e-4
      Run 1000 steps. Collect all lr values.
      Assert: lr values form decreasing sequence after step 100
      Assert: lr(999) < 0.01 * lr_max
    if_fails: "Cosine decay not monotonically decreasing"

  - id: FALSIFY-COSINE-004
    rule: "Fallback to constant lr when max_steps is None"
    prediction: "Without max_steps, lr stays at lr_max after warmup"
    test: |
      Given: warmup_steps=100, max_steps=None, lr_max=3e-4
      At step 200: Assert current_lr() == 3e-4
      At step 1000: Assert current_lr() == 3e-4
    if_fails: "Missing fallback for unset max_steps"
