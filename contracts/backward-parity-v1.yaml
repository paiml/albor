# backward-parity-v1.yaml — C-BACKPARITY-001
#
# Provable contract for backward pass parity with PyTorch.
# Verifies that entrenar's GPU backward kernels produce gradients
# matching HuggingFace LLaMA's autograd within tolerance.
#
# Methodology: feed IDENTICAL fixed input to both systems,
# run one forward+backward pass, compare per-layer gradient norms.
# The layer with the largest discrepancy reveals the buggy kernel.
#
# Golden reference generated by: scripts/parity_test.py
# PyTorch LlamaForCausalLM, seed=123, input=[100..1123], tied embeddings.

metadata:
  version: "1.0.0"
  created: "2026-03-27"
  author: "PAIML Engineering"
  description: "Backward pass gradient parity — per-layer comparison vs PyTorch"
  references:
    - "entrenar#312: backward pass 2x less effective"
    - "entrenar#309: parent convergence gap issue"
    - "PyTorch autograd: torch.autograd"
    - "Parity test: scripts/parity_test.py golden reference"
  depends_on:
    - "weight-initialization-v1"
    - "causal-attention-mask-v1"
    - "gradient-clipping-v1"

equations:
  gradient_parity:
    formula: |
      For fixed input tokens T = [100, 101, ..., 1123] (1024 tokens):
        loss_pytorch = CrossEntropy(LlamaForCausalLM(T), T[1:])
        loss_entrenar = CrossEntropy(CudaTransformer(T), T[1:])

        For each parameter group P in {embed, q, k, v, o, gate, up, down, norm}:
          gnorm_pytorch[P] = ||∂loss/∂P||_2  (PyTorch autograd)
          gnorm_entrenar[P] = ||∂loss/∂P||_2 (entrenar CUDA backward)

          parity_ratio[P] = gnorm_entrenar[P] / gnorm_pytorch[P]
    domain: |
      T: fixed input token IDs [1024]
      P: named parameter group
    codomain: "Per-parameter gradient norm parity ratio"
    invariants:
      - "loss_entrenar ≈ loss_pytorch (step-0 parity, within 1%)"
      - "0.5 < parity_ratio[P] < 2.0 for all P (within 2x)"
      - "The MOST divergent P reveals the buggy backward kernel"

  golden_reference:
    formula: |
      PyTorch golden gradient norms (from scripts/parity_test.py):
        embed_tokens:     gnorm = 3.159
        layers.0.q_proj:  gnorm = 0.568
        layers.0.k_proj:  gnorm = 0.562
        layers.0.v_proj:  gnorm = 2.631
        layers.0.o_proj:  gnorm = 2.514
        layers.0.gate:    gnorm = 1.879
        layers.0.up:      gnorm = 1.908
        layers.0.down:    gnorm = 1.926
        layers.0.norm1:   gnorm = 0.055
        layers.0.norm2:   gnorm = 0.054
        total_gnorm:      7.409
    domain: "Fixed input T, seed=123, N(0,0.02) init, tied embeddings"
    codomain: "Reference gradient norms per parameter group"
    invariants:
      - "Golden values are deterministic (same seed → same gradients)"

  layer_trace_protocol:
    formula: |
      The backward parity test is invoked via:
        apr trace <checkpoint> --backward --reference golden.json

      For each layer L in [0, num_layers):
        1. Forward pass through layer L (recompute activations)
        2. Backward pass through layer L
        3. Capture gradient norms for all 9 parameter groups
        4. Compare against golden reference
        5. Report parity ratio and PASS/FAIL per group

      Ship/kill gate: ALL parity ratios in [0.5, 2.0] → SHIP
                      ANY ratio outside [0.5, 2.0] → KILL (buggy kernel)
    domain: "APR checkpoint, golden reference JSON"
    codomain: "Per-layer SHIP/KILL verdict"

proof_obligations:
  - type: bound
    property: "Step-0 loss parity"
    formal: "|loss_e - loss_p| / loss_p < 0.01"
    tolerance: 0.01
    applies_to: gradient_parity

  - type: bound
    property: "Per-layer gradient norm parity"
    formal: "forall P: 0.5 < gnorm_e[P] / gnorm_p[P] < 2.0"
    tolerance: 0.0
    applies_to: gradient_parity

  - type: bound
    property: "Total gradient norm parity"
    formal: "0.5 < total_gnorm_e / total_gnorm_p < 2.0"
    tolerance: 0.0
    applies_to: gradient_parity

falsification_tests:
  - id: FALSIFY-BACKPARITY-001
    rule: "Embedding gradient within 2x of PyTorch"
    prediction: "gnorm_e(embed) / 3.159 in [0.5, 2.0]"
    test: |
      Run one forward+backward step on fixed input T.
      Compute gnorm for embed_tokens gradient.
      Assert 1.58 < gnorm < 6.32.
    if_fails: "Embedding backward or cross-entropy gradient is wrong"

  - id: FALSIFY-BACKPARITY-002
    rule: "Attention projection gradients within 2x"
    prediction: |
      gnorm_e(q_proj) / 0.568 in [0.5, 2.0]
      gnorm_e(v_proj) / 2.631 in [0.5, 2.0]
    test: |
      Same step, capture q_proj and v_proj gradients.
      Assert within tolerance.
    if_fails: "Attention backward GEMM has wrong arguments (likely transposed)"

  - id: FALSIFY-BACKPARITY-003
    rule: "FFN gradients within 2x"
    prediction: |
      gnorm_e(gate) / 1.879 in [0.5, 2.0]
      gnorm_e(down) / 1.926 in [0.5, 2.0]
    test: |
      Same step, capture gate_proj and down_proj gradients.
    if_fails: "SiLU backward or FFN GEMM backward is wrong"

  - id: FALSIFY-BACKPARITY-004
    rule: "Total gradient norm within 2x"
    prediction: "total_gnorm_e / 7.409 in [0.5, 2.0]"
    test: |
      Compute total L2 norm across all parameters.
      Assert 3.7 < total < 14.8.
    if_fails: "Systemic backward pass error across multiple kernels"

  - id: FALSIFY-BACKPARITY-005
    rule: "Gradient direction cosine similarity > 0.9"
    prediction: |
      For each parameter P: cos_sim(grad_e[P], grad_p[P]) > 0.9
    test: |
      Requires full gradient tensor comparison (not just norms).
      Flatten both gradient tensors, compute cosine similarity.
    if_fails: "Gradients have correct magnitude but wrong direction"

kani_harnesses:
  - id: KANI-BACKPARITY-001
    obligation: gradient_parity
    property: "Loss is differentiable — backward produces non-zero gradients"
    bound: 4
    strategy: exhaustive
    harness: verify_backward_nonzero

qa_gate:
  id: F-BACKPARITY-001
  name: "Backward Pass Gradient Parity"
  min_coverage: 0.90
  max_complexity: 15
  required_tests:
    - "embedding_gradient_parity"
    - "attention_gradient_parity"
    - "ffn_gradient_parity"
    - "total_gradient_parity"
    - "gradient_direction_cosine_similarity"
