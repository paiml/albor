# knowledge-distillation-kernel-v1.yaml — ALB-013
#
# Provable contract for knowledge distillation loss computation.
# KD_loss = alpha * KL(sigma(z_t/T) || sigma(z_s/T)) * T^2 + (1-alpha) * CE(y, z_s)
#
# Verifies correctness of the KL divergence computation, temperature scaling,
# alpha interpolation, and gradient flow through the distillation loss.

contract:
  name: "knowledge-distillation-kernel"
  version: "1.0"
  component: "entrenar"
  gap_id: "ALB-013"
  priority: "critical"

equations:
  kd_loss:
    latex: "\\mathcal{L}_{KD} = \\alpha \\cdot KL(\\sigma(z_t/T) \\| \\sigma(z_s/T)) \\cdot T^2 + (1-\\alpha) \\cdot CE(y, z_s)"
    description: "Combined knowledge distillation loss with temperature-scaled KL divergence and hard-label cross entropy"

  kl_divergence:
    latex: "KL(P \\| Q) = \\sum_i P(i) \\log \\frac{P(i)}{Q(i)}"
    description: "KL divergence between teacher and student softmax distributions"

  temperature_scaling:
    latex: "\\sigma(z/T)_i = \\frac{e^{z_i/T}}{\\sum_j e^{z_j/T}}"
    description: "Temperature-scaled softmax, T > 0"

obligations:
  - id: "KD-001"
    name: "KL non-negativity"
    level: 4                               # Kani bounded model check
    property: "KL(P || Q) >= 0 for all valid probability distributions P, Q"
    test: "proptest with 10000 random logit pairs, assert KL >= -1e-7"
    falsification: "FALSIFY-ALBOR-004"

  - id: "KD-002"
    name: "Temperature scaling invariant"
    level: 3                               # Property-based test
    property: "softmax(z/T) is a valid probability distribution (sums to 1, all >= 0) for T > 0"
    test: "proptest with random logit vectors and T in (0.1, 100), assert sum within 1e-6 of 1.0"

  - id: "KD-003"
    name: "Alpha interpolation bound"
    level: 3
    property: "For alpha in [0, 1]: KD_loss is bounded between pure KL loss and pure CE loss"
    test: "proptest: alpha=0 => KD_loss == CE_loss; alpha=1 => KD_loss == T^2 * KL_loss"

  - id: "KD-004"
    name: "Gradient correctness"
    level: 3
    property: "Numerical gradient of KD_loss w.r.t. student logits matches analytical gradient within 1e-4"
    test: "Finite difference check on 1000 random inputs"

  - id: "KD-005"
    name: "T^2 scaling"
    level: 3
    property: "The T^2 factor compensates for the 1/T^2 reduction in gradient magnitude from temperature scaling"
    test: "Verify gradient magnitude is approximately constant across T in [1, 10]"

  - id: "KD-006"
    name: "Distillation improves over base"
    level: 2                               # Falsification test
    property: "albor-distill avg benchmark > albor-base avg benchmark"
    test: "Paired t-test on eval suite with p < 0.05"
    falsification: "FALSIFY-ALBOR-005"

inputs:
  teacher_logits:
    type: "Tensor<f32>"
    shape: "[batch, seq_len, vocab_size]"
    constraints: "finite, no NaN/Inf"

  student_logits:
    type: "Tensor<f32>"
    shape: "[batch, seq_len, vocab_size]"
    constraints: "finite, no NaN/Inf"

  labels:
    type: "Tensor<i64>"
    shape: "[batch, seq_len]"
    constraints: "values in [0, vocab_size)"

  temperature:
    type: "f32"
    constraints: "> 0"

  alpha:
    type: "f32"
    constraints: "in [0.0, 1.0]"

outputs:
  loss:
    type: "f32"
    constraints: ">= 0, finite"

  kl_loss:
    type: "f32"
    constraints: ">= 0, finite"

  ce_loss:
    type: "f32"
    constraints: ">= 0, finite"
