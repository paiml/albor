<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 320">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="40%" stop-color="#16213e"/>
      <stop offset="70%" stop-color="#e94560"/>
      <stop offset="85%" stop-color="#f5a623"/>
      <stop offset="100%" stop-color="#ffd700"/>
    </linearGradient>
    <radialGradient id="sun" cx="50%" cy="85%" r="30%">
      <stop offset="0%" stop-color="#fff7e6" stop-opacity="1"/>
      <stop offset="30%" stop-color="#ffd700" stop-opacity="0.9"/>
      <stop offset="60%" stop-color="#f5a623" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#e94560" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="textGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffd700"/>
      <stop offset="50%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#ffd700"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Sky -->
  <rect width="960" height="320" fill="url(#sky)"/>

  <!-- Sun glow -->
  <ellipse cx="480" cy="270" rx="300" ry="120" fill="url(#sun)"/>

  <!-- Horizon line -->
  <line x1="0" y1="260" x2="960" y2="260" stroke="#ffd700" stroke-width="1" opacity="0.5"/>

  <!-- Stars -->
  <circle cx="120" cy="40" r="1.5" fill="white" opacity="0.8"/>
  <circle cx="250" cy="65" r="1" fill="white" opacity="0.6"/>
  <circle cx="380" cy="30" r="1.5" fill="white" opacity="0.7"/>
  <circle cx="580" cy="50" r="1" fill="white" opacity="0.5"/>
  <circle cx="700" cy="35" r="1.5" fill="white" opacity="0.8"/>
  <circle cx="820" cy="55" r="1" fill="white" opacity="0.6"/>
  <circle cx="180" cy="80" r="1" fill="white" opacity="0.4"/>
  <circle cx="650" cy="75" r="1" fill="white" opacity="0.4"/>
  <circle cx="860" cy="25" r="1.5" fill="white" opacity="0.7"/>
  <circle cx="50" cy="70" r="1" fill="white" opacity="0.5"/>

  <!-- Title -->
  <text x="480" y="140" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="700" fill="url(#textGrad)" filter="url(#glow)" letter-spacing="12">ALBOR</text>

  <!-- Subtitle -->
  <text x="480" y="180" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#e8d5b7" letter-spacing="4" font-weight="300">SOVEREIGN PYTHON CODE COMPLETION</text>

  <!-- Stack chips -->
  <g font-family="ui-monospace, 'Cascadia Code', monospace" font-size="11" fill="#1a1a2e">
    <!-- Row 1 -->
    <rect x="168" y="210" width="72" height="22" rx="4" fill="#ffd700" opacity="0.9"/>
    <text x="204" y="225" text-anchor="middle" font-size="10">entrenar</text>

    <rect x="252" y="210" width="64" height="22" rx="4" fill="#ffd700" opacity="0.9"/>
    <text x="284" y="225" text-anchor="middle" font-size="10">trueno</text>

    <rect x="328" y="210" width="72" height="22" rx="4" fill="#ffd700" opacity="0.9"/>
    <text x="364" y="225" text-anchor="middle" font-size="10">aprender</text>

    <rect x="412" y="210" width="64" height="22" rx="4" fill="#ffd700" opacity="0.9"/>
    <text x="444" y="225" text-anchor="middle" font-size="10">realizar</text>

    <rect x="488" y="210" width="76" height="22" rx="4" fill="#ffd700" opacity="0.9"/>
    <text x="526" y="225" text-anchor="middle" font-size="10">alimentar</text>

    <rect x="576" y="210" width="64" height="22" rx="4" fill="#ffd700" opacity="0.9"/>
    <text x="608" y="225" text-anchor="middle" font-size="10">forjar</text>

    <rect x="652" y="210" width="72" height="22" rx="4" fill="#ffd700" opacity="0.9"/>
    <text x="688" y="225" text-anchor="middle" font-size="10">presentar</text>

    <!-- Row 2 -->
    <rect x="248" y="240" width="68" height="22" rx="4" fill="#e8d5b7" opacity="0.7"/>
    <text x="282" y="255" text-anchor="middle" font-size="10">batuta</text>

    <rect x="328" y="240" width="72" height="22" rx="4" fill="#e8d5b7" opacity="0.7"/>
    <text x="364" y="255" text-anchor="middle" font-size="10">repartir</text>

    <rect x="412" y="240" width="56" height="22" rx="4" fill="#e8d5b7" opacity="0.7"/>
    <text x="440" y="255" text-anchor="middle" font-size="10">pmat</text>

    <rect x="480" y="240" width="68" height="22" rx="4" fill="#e8d5b7" opacity="0.7"/>
    <text x="514" y="255" text-anchor="middle" font-size="10">certeza</text>

    <rect x="560" y="240" width="56" height="22" rx="4" fill="#e8d5b7" opacity="0.7"/>
    <text x="588" y="255" text-anchor="middle" font-size="10">bashrs</text>

    <rect x="628" y="240" width="56" height="22" rx="4" fill="#e8d5b7" opacity="0.7"/>
    <text x="656" y="255" text-anchor="middle" font-size="10">pv</text>
  </g>

  <!-- Model spec line -->
  <text x="480" y="295" text-anchor="middle" font-family="ui-monospace, monospace" font-size="12" fill="#e8d5b7" opacity="0.7">350M params | LLaMA-style | distilled from Qwen3-Coder-Next 80B | pure Rust | zero Python deps</text>
</svg>
