# cargo-deny configuration for albor (cargo-deny 0.18+)
# https://embarkstudios.github.io/cargo-deny/

[advisories]
# Use default settings — deny known vulnerabilities

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Unicode-3.0",
    "Unicode-DFS-2016",
]

[bans]
multiple-versions = "warn"
wildcards = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
